<!-- 🔥 Animation Script -->
<script>
  const bars = document.querySelectorAll(".skill-fill");

  window.addEventListener("load", () => {
    bars.forEach(bar => {
      const width = bar.getAttribute("data-width");
      setTimeout(() => {
        bar.style.width = width;
      }, 300);
    });
  });
</script>
