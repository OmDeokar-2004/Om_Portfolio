<!-- 🔥 TYPING SCRIPT -->
<script>
const text1 = "AI/ML Engineer | Data Science Enthusiast";
const text2 = "AI • ML • Data • Innovation";

let i = 0;
let j = 0;

function typeMain() {
  if (i < text1.length) {
    document.querySelector(".typing-text").textContent += text1.charAt(i);
    i++;
    setTimeout(typeMain, 40);
  } else {
    setTimeout(typeSub, 400);
  }
}

function typeSub() {
  if (j < text2.length) {
    document.querySelector(".typing-sub").textContent += text2.charAt(j);
    j++;
    setTimeout(typeSub, 40);
  }
}

window.onload = typeMain;
</script>
